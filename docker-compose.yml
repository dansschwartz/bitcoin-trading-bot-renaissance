version: "3.8"

services:
  bot:
    build: .
    container_name: renaissance-bot
    command: python run_renaissance_bot.py --run
    env_file: .env
    volumes:
      - bot-data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    restart: unless-stopped
    depends_on:
      - dashboard

  dashboard:
    build: .
    container_name: renaissance-dashboard
    command: uvicorn dashboard.server:app --host 0.0.0.0 --port 8080
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - bot-data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  arbitrage:
    build: .
    container_name: renaissance-arbitrage
    command: python -m arbitrage
    env_file: .env
    volumes:
      - bot-data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  bot-data:
